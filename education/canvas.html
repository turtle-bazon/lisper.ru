<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Canvas JSCL</title></head>
<body>
  <canvas id="c" width="250" height="200"></canvas>
  <script src="jscl.js"></script>
  <script type="text/x-common-lisp">
    (let* ((canvas (#j:document:getElementById #j"c"))
           (ctx ((jscl::oget canvas "getContext") #j"2d"))
           (color "red"))
      (setf (jscl::oget ctx "fillStyle") #j"tomato")
      ((jscl::oget ctx "fillRect") 50 50 100 100)
      (setf (jscl::oget ctx "fillStyle") (jscl/ffi:jsstring color))
      ((jscl::oget ctx "fillRect") 150 50 100 100))
    (let ((doc #j:document))
      ((jscl::oget doc "addEventListener")
        #j"keydown"
       (lambda (e)
         (#j:console:log e)
         (#j:console:log (jscl::oget e "keyCode"))
         (when (= 32 (jscl::oget e "keyCode"))
           (#j:console:log "pressed")))))
  </script>
</body>
</html>
